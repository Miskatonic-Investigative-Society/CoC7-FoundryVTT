_id: coc7macrandfemA1
name: Random Female Name American (Actor)
type: script
scope: global
folder: osUcnVzKwmBGuZel
img: icons/commodities/tech/electronics-button-skull-red.webp
command: |
  // WARNING: This macro will overwrite the name of the actor!
  // Generates a random female name from compendium tables and applies it to ACTOR of selected token.
  async function getRandomFemaleName() {
    const table1 = await fromUuid("Compendium.CoC7.en-wiki-roll-tables.RollTable.zvWGA3uHfT3jbOqT");
    const table2 = await fromUuid("Compendium.CoC7.en-wiki-roll-tables.RollTable.QwGXBkSLea1sJEvK");
    if (!table1 || !table2) {
      ui.notifications.error("Compendium table not found!");
      return null;
    }
    const firstNameResult = await table1.draw({ displayChat: false });
    const lastNameResult = await table2.draw({ displayChat: false });
    if (firstNameResult.results.length > 0 || lastNameResult.results.length > 0) {
      const firstName = firstNameResult.results[0].name;
      const lastName = lastNameResult.results[0].name;
      return `${firstName} ${lastName}`;
    }
    return null;
  }
  const tokens = canvas.tokens.controlled;
  if (tokens.length > 0) {
    const updates = [];
    for (const token of tokens) {
      const randomName = await getRandomFemaleName();
      if (randomName) {
        updates.push({
          actor: {
            _id: token.actor.id,
            name: randomName,
            prototypeToken: {
              name: randomName
            },
            token: {
              _id: token.id,
              name: randomName
            }
          }
        });
      }
    }
    if (updates.length > 0) {
      const updatedActors = await Actor.implementation.updateDocuments(updates.map(update => update.actor));
      const updatedTokens = await Token.implementation.updateDocuments(updates.map(update => update.token));
      ui.notifications.info(`Updated ${updates.length} token names.`);
    }
  } else {
    ui.notifications.warn("No tokens were selected");
  }
flags:
  CoC7:
    cocidFlag:
      id: m..random-female-name-actor-american
      lang: en
      priority: 0
